services:
  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/checkpoints:/app/checkpoints

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend